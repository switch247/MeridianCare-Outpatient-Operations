services:
  db:
    image: postgres:15
    container_name: t2-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meridiancare-clinic
    ports:
      - "127.0.0.1:5432:5432"

    # Named volumes for production safety and portability
    volumes:
      pgdata:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meridiancare-clinic"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  backend:
    container_name: t2-backend
    build: ./backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@t2-db:5432/meridiancare-clinic
      JWT_SECRET: ${JWT_SECRET:-meridian-local-jwt-secret}
      PHI_KEY: ${PHI_KEY:-meridian-local-phi-key}
      PORT: 3000
      PLAYWRIGHT_CHROMIUM_PATH : /usr/bin/chromium-browser
      API_BASE_URL: http://localhost:3000
      SEED_PASSWORD: ${SEED_PASSWORD:-Password!123}
    ports:
      - "13000:3000"
    volumes:
      - ./data/backups:/app/backups
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: t2-frontend
    build: ./frontend
    environment:
      API_BASE_URL: http://localhost:3000
    ports:
      - "14200:4200"
    depends_on:
      - backend
    # Use a named volume for production and cross-platform compatibility
  volumes:
      - pgdata:/var/lib/postgresql/data

# no named volumes required; Postgres data is bind-mounted to ./data/postgres
