services:
  db:
    image: postgres:15
    container_name: t2-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meridiancare-clinic
    ports:
      - "127.0.0.1:5432:5432"
    # bind-mount DB files into the repo so data is stored alongside the code
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meridiancare-clinic"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  backend:
    container_name: t2-backend
    build: ./backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@t2-db:5432/meridiancare-clinic
      JWT_SECRET: meridian-local-jwt-secret
      PHI_KEY: meridian-local-phi-key
      PORT: 3000
      SEED_PASSWORD: Password!123
    ports:
      - "13000:3000"
    volumes:
      - ./data/backups:/app/backups
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: t2-frontend
    build: ./frontend
    ports:
      - "14200:4200"
    depends_on:
      - backend

# no named volumes required; Postgres data is bind-mounted to ./data/postgres
