services:
  db:
    image: postgres:15
    container_name: t2-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meridiancare-clinic
    ports:
      - "127.0.0.1:5432:5432"
    # bind-mount DB files into the repo so data is stored alongside the code
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  backend:
    container_name: t2-backend
    build: ./backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@t2-db:5432/meridiancare-clinic
      JWT_SECRET: meridian-local-jwt-secret
      PHI_KEY: meridian-local-phi-key
      PORT: 3000
    ports:
      - "13000:3000"
    volumes:
      - ./data/backups:/app/backups
    depends_on:
      - db

  frontend:
    container_name: t2-frontend
    build: ./frontend
    ports:
      - "14200:4200"
    depends_on:
      - backend

# no named volumes required; Postgres data is bind-mounted to ./data/postgres
