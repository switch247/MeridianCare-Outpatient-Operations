<main class="layout">
  <header>
    <h1>MeridianCare Outpatient Operations</h1>
    <p>Desktop-first Angular workstation interface</p>
  </header>

  <section class="panel auth">
    <h2>Local Login</h2>
    <div class="row">
      <input [(ngModel)]="username" placeholder="username" />
      <input [(ngModel)]="password" placeholder="password" type="password" />
      <button (click)="login()" [disabled]="busy() || !username">Sign In</button>
    </div>
    <p class="msg">{{ message() }}</p>
  </section>

  <nav class="roles">
    <button *ngFor="let r of roles" (click)="setRole(r)" [class.active]="role()===r">{{r}}</button>
  </nav>

  <section class="panel">
    <h2>{{ role() | titlecase }} Workflow</h2>
    <ol>
      <li *ngFor="let step of activeSteps()">{{ step }}</li>
    </ol>
    <button class="run" (click)="runRoleAction()" [disabled]="busy() || !api.getToken()">Run {{ role() }} Action</button>
    <pre *ngIf="apiResult()">{{ apiResult() | json }}</pre>
  </section>
</main>
